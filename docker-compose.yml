version: '3.8'

services:
  # Servidor Backend PHP (Apache configurado para Laravel)
  app:
    image: php:8.4-apache
    container_name: proviemplea_backend
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    command: >
      sh -c "a2enmod rewrite && sed -i 's!/var/www/html!/var/www/html/public!g' /etc/apache2/sites-available/000-default.conf && apache2-foreground"

  # Base de Datos MySQL (Exigencia del Profesor)
  db:
    image: mysql:8.0
    container_name: proviemplea_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: proviemplea
      MYSQL_ROOT_PASSWORD: root

  # Interfaz de Swagger UI
  swagger-ui:
    image: swaggerapi/swagger-ui
    container_name: proviemplea_swagger_ui
    ports:
      - "8081:8080"
    volumes:
      - ./swagger.yaml:/usr/share/nginx/html/swagger.yaml
    environment:
      SPEC_URL: swagger.yaml




