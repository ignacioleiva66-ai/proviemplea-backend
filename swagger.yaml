openapi: 3.0.3
info:
  title: ProviEmplea API - Plataforma de Búsqueda Inversa de Empleo
  description: |
    API Backend para el proyecto ProviEmplea del Departamento de Empleo de Providencia.
    Plataforma pionera en búsqueda inversa de talento con CV Ciego (sin discriminación por nombre, edad, género, etc.).
  version: 1.0.0
  contact:
    name: Solange Montaldo / Cecilia Ahumada
    email: solange.montaldo@providencia.cl

servers:
  - url: http://localhost:8000/api
    description: Servidor Local Docker

tags:
  - name: Personas
    description: Gestión de perfiles de candidatos (CV Ciego)
  - name: Empresas
    description: Gestión de empresas registradas
  - name: Health
    description: Verificación del estado del servicio

paths:
  /health:
    get:
      tags: [Health]
      summary: Verificar estado de la API
      responses:
        '200':
          description: API funcionando correctamente
          content:
            application/json:
              example:
                status: "success"
                message: "ProviEmplea API está operativa"
                version: "1.0.0"

  /personas:
    get:
      tags: [Personas]
      summary: Listar todos los perfiles visibles
      description: Retorna perfiles con caché aplicado
      responses:
        '200':
          description: Lista exitosa
          content:
            application/json:
              example:
                - id: 1
                  experiencia_laboral: ["Desarrollador Backend en Empresa XYZ"]
                  habilidades: ["PHP", "Laravel", "MySQL", "Docker"]
                  certificaciones: ["Laravel Certified"]
                  anos_experiencia: 5
                  visible: true

    post:
      tags: [Personas]
      summary: Crear nuevo perfil de candidato (CV Ciego)
      requestBody:
        required: true
        content:
          application/json:
            example:
              experiencia_laboral: ["Experiencia anterior"]
              habilidades: ["Laravel", "React"]
              certificaciones: ["Certificado 1"]
              anos_experiencia: 3
      responses:
        '201': 
          description: Perfil creado correctamente
        '422':
          description: Error de validación

  /personas/{id}:
    get:
      tags: [Personas]
      summary: Obtener un perfil por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200': { description: Perfil encontrado }
        '404': { description: Perfil no encontrado }

    put:
      tags: [Personas]
      summary: Actualizar perfil completo
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Perfil actualizado }

    delete:
      tags: [Personas]
      summary: Eliminar perfil
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Perfil eliminado correctamente }

  /empresas:
    get:
      tags: [Empresas]
      summary: Listar empresas
      responses:
        '200': { description: Lista de empresas }

    post:
      tags: [Empresas]
      summary: Crear empresa
      responses:
        '201': { description: Empresa creada }

  /empresas/{id}:
    get:
      tags: [Empresas]
      summary: Ver empresa
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Empresa encontrada }

    put:
      tags: [Empresas]
      summary: Actualizar empresa
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Empresa actualizada }

    delete:
      tags: [Empresas]
      summary: Eliminar empresa
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Empresa eliminada }

components:
  schemas:
    Persona:
      type: object
      properties:
        experiencia_laboral: 
          type: array
          items: { type: string }
        habilidades: 
          type: array
          items: { type: string }
        certificaciones: 
          type: array
          items: { type: string }
        anos_experiencia: 
          type: integer
