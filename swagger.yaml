openapi: 3.0.3
info:
  title: API ProviEmplea - Vitrina de Talentos Inversa
  description: |
    Documentación Backend PHP/Laravel para el caso ProviEmplea.
    Implementa un enfoque estricto de **Currículum Ciego** para evitar la discriminación laboral, omitiendo nombres, edad, género y comuna.
    
    ### Optimización de Rendimiento
    * **Rate Limiting:** Máximo 60 peticiones por minuto. Retorna `429 Too Many Requests` si se excede.
    * **Caché:** Endpoints de lectura utilizan `Cache-Control: public, max-age=300`.
  version: 1.0.0

servers:
  - url: http://localhost:8080/api
    description: Servidor Local Dockerizado

paths:
  /perfiles:
    get:
      summary: Listar perfiles (CV Ciego)
      description: Obtiene todos los candidatos disponibles.
      responses:
        '200':
          description: Lista obtenida.
          headers:
            Cache-Control:
              schema:
                type: string
                example: public, max-age=300
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PerfilCandidato'
        '429':
          description: Límite de peticiones excedido.

    post:
      summary: Crear nuevo perfil
      description: Inserta un candidato validando la estructura del CV ciego.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilInput'
      responses:
        '201':
          description: Perfil creado exitosamente.
        '400':
          description: Datos inválidos.

  /perfiles/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer

    get:
      summary: Obtener un perfil por ID
      responses:
        '200':
          description: Perfil encontrado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PerfilCandidato'
        '404':
          description: Perfil no encontrado.

    put:
      summary: Actualizar perfil completo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PerfilInput'
      responses:
        '200':
          description: Perfil actualizado.
        '404':
          description: ID no encontrado.

    delete:
      summary: Eliminar perfil
      responses:
        '200':
          description: Perfil eliminado.
        '404':
          description: Perfil no encontrado.

  /perfiles/{id}/estado:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      summary: Activar o desactivar visibilidad
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                visible:
                  type: boolean
                  example: true
      responses:
        '200':
          description: Estado modificado.
        '400':
          description: Error en el cuerpo de la petición.

components:
  schemas:
    PerfilCandidato:
      type: object
      properties:
        id:
          type: integer
          example: 101
        experiencia_laboral:
          type: array
          items:
            type: object
            properties:
              puesto:
                type: string
                example: "Desarrollador Backend"
              anos:
                type: integer
                example: 3
        habilidades:
          type: array
          items:
            type: string
            example: ["PHP", "Laravel", "Docker"]
        visible:
          type: boolean
          example: true

    PerfilInput:
      type: object
      required:
        - experiencia_laboral
        - habilidades
      properties:
        experiencia_laboral:
          type: array
          items:
            type: object
            properties:
              puesto:
                type: string
                example: "Desarrollador Backend"
              anos:
                type: integer
                example: 3
        habilidades:
          type: array
          items:
            type: string
            example: ["PHP", "Laravel", "Docker"]
